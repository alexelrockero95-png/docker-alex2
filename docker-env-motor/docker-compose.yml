services:
  web:
    build: .
    container_name: php-web-concesionario
    ports:
      - "8090:80"
    volumes:
      - ../proyecto-php-concesionario:/var/www/html
    depends_on:
      db:
        condition: service_started
  db:
    image: mariadb:11
    container_name: mariadb-concesionario
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: concesionario_php
      MYSQL_USER: mecanico
      MYSQL_PASSWORD: taller123
    volumes:
      - ./db-concesionario:/var/lib/mysql
    ports:
      - "3310:3306"
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: phpmyadmin-concesionario
    restart: always
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_USER: mecanico  
      PMA_PASSWORD: taller123
    ports:
      - "8091:80"
  browsersync:
    image: node:20-alpine
    container_name: browsersync-concesionario
    working_dir: /app
    depends_on:
      - web
    volumes:
      - ../proyecto-php-concesionario:/src
    command: sh -c "npm install -g browser-sync && browser-sync start --proxy 'web:80' --files '/src/**/*.*' --no-ui --host 0.0.0.0 --port 3002"
    ports:
      - "3002:3002"
